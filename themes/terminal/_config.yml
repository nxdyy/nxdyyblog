# Terminal Theme Configuration

# Site banner text (will generate ASCII art style)
banner_text: Terminal

# Navigation menu
menu:
  - title: Home
    url: /
    shortcut: H
  - title: Archives
    url: /archives
    shortcut: A
  - title: Categories
    url: /categories
    shortcut: C
  - title: Tags
    url: /tags
    shortcut: T
  - title: About
    url: /about
    shortcut: B

# Sidebar configuration
sidebar:
  enable: true
  default_collapsed: false
  sections:
    author: true
    recent_posts: true
    categories: true
    tags: true
    links: true

# Personal links
links:
  - name: Github
    url: https://github.com/

# Article preview length (number of characters)
excerpt_length: 200

# Comment system
comment:
  enable: false
  # Supported: gitalk, gitment, valine, disqus
  type: gitalk
  gitalk:
    clientID:
    clientSecret:
    repo:
    owner:
    admin:
    distractionFreeMode: false

# Search
search:
  enable: true
  placeholder: "Search posts..."
  shortcut: "/"

# Code highlight theme (compatible with highlight.js)
highlight_theme: atom-one-dark

# Math rendering (KaTeX)
math:
  enable: true
  # cdn for KaTeX
  katex_css: https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css
  katex_js: https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js
  katex_auto_render: https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js

# Theme toggle
theme_toggle:
  enable: true
  default: dark

# Footer tip text
footer_tip: "Powered by Hexo | Theme Terminal"

# Pagination
pagination:
  prev_text: "< Prev"
  next_text: "Next >"

# Social links shown in sidebar
social:
  github:
    url: "https://github.com/"
    text: GitHub
  email:
    url: "mailto:"
    text: Email
