# ========================================
# Material Blog Theme Configuration
# ========================================

# use_logo如果为true, 需要在logo_image设置路径
use_logo: false
logo_image:  # 使用路径, 填写文件名即可(比如, logo_image: logo.png 指向 source/imgs/logo.png)
navbar_text: # 如果没有Logo, 则设置为false, 并且设置navbar_text(否则默认为站点标题, 最好进行设置)

# 必填, 设定小型设备展示背景图, 指向source/imgs, 比如xs_bg_image: bg.png -> source/imgs/bg.png
xs_bg_image: xsbg.gif

# 必填, 个人头像, 如果是路径, 则指向source/imgs
# 也可以填http:// OR https:// url地址
author_image: avatar.jpg

# 程序员模式, 适合于用该程序的爱好写技术文章的人员, 默认不开启
# 选择开启后将会改变article-excerpt, article-content等的显示
programmer_mode: false

# 导航菜单 (使用Material Icons)
menu:
  # index
  - title: 首页
    icon: home
    url: /
  # archives
  - title: 归档
    icon: archive
    url: archives
  # categories
  - title: 分类
    icon: list
    url: categories
    dropdown: 3 # dropdown为下拉菜单出现的项目最大数目(只限于tags和categorys)
    # 如果不想显示下拉菜单, 则不要填写, 即dropdown:
  # tags
  - title: 标签
    icon: label
    url: tags
    dropdown: 3
  # about
  - title: 关于我
    icon: person
    url: about
  - title: 开源许可
    icon: gavel
    url: license

# 每篇文章的preview默认图片
# 必填项(除非你每篇文章的front-matter都设置了preview属性)
# 填写: 可以放多张图, 将随机抽取作为默认的preview图片
# 如果使用文件名则对应目录: source/imgs/preview, 比如 preview1.jpg -> source/imgs/preview/preview1.jpg
# 如果用url则填写完整的url地址即可
default_preview:
  - preview1.jpg
  - preview2.jpg
  - preview3.jpg
  - preview4.jpg

# 侧边栏
sidebar:
  recent_comments: true   # 最新评论, 默认关闭, 可能需要自己进行模板配置
  hot_posts: true         # 最热文章, 如果配置了下面的文章统计就可以使用该侧边栏, 否则设置为false
  recent_posts: true      # 最新文章, 默认开启
  random_posts: true      # 随机文章, 默认开启
  tags: true              # 热门标签, 默认开启
  friend_links: false     # 友情链接, 默认开启
  links: true             # 个人链接, 默认开启

# 友情链接配置, 要先开启上面的friend_links
friend_links:
  - name: KDays Forum
    link: http://kdays.net/days/

# 个人链接配置, 要先开启上面的links
links:
  - name: Github
    link: https://github.com/nxdyy/


# 是否使用公告
# 公告是什么可以看https://myau.moe
# 如果使用了公告, 那么公告内容需要自己去配置
# 在主题下的layout/_partial/issue.ejs进行内容修改
# 如果不用公告, 请设置此项为false
use_issue: true

# 指定代码高亮风格 (Shiki主题)
# 目前支持以下选择 (Shiki内置主题名)
# github-dark
# github-light
# monokai
# dracula
# one-dark-pro
# material-theme-palenight
# night-owl
# solarized-dark
# solarized-light
highlight_theme: one-dark-pro

# 背景图功能
# 必填项
slide_background:
  # 默认为false, 即采用路径图片
  use_url: false
  # use_url: true情况下, 采用七牛外链空间的形式, 下面三个参数组合指向: http://ouo1ro65u.bkt.clouddn.com/background(1~10).png
  # prefix: http://ouo1ro65u.bkt.clouddn.com/background   七牛对象存储空间外链主机地址和图片名称前缀
  # ext: png          图片的后缀格式, 要求可供选择的图片都是统一后缀
  # max_count: 10     可供选择的图片数量, 背景图会从这里随机抽取6张图

  # use_url: false情况下, 采用本地博客图片路径, 下面三个参数组合指向: source/imgs/slide/background(1~6).jpg
  prefix: slide/background
  ext: jpg
  max_count: 6


# 是否开启欧尼酱功能
open_oni: false
# 欧尼酱功能设置, 前提为open_oni: true
oni_setting:
  # 限三项, 可以自己配置链接(一般是上面的menu或者自己的page)
  - title: 归档
    url: archives
  - title: 关于
    url: about
  - title: 留言板
    url: message
# 欧尼酱选项图片(可以自己替换, 最好是100 * 100像素的图片)


# 输入特效activate-power-mode
# https://github.com/disjukr/activate-power-mode
power_mode:
  colorful: true
  shake: true

# 文章统计, 目前只支持leancloud
# 获取appId和appKey方法直接百度 or google
# 注意一旦生成新的文章就不要随便改名了
leancloud:
  appid:  # yourappId
  appkey: # your appKey

# 评论系统, 目前只支持gitment(为了自定义样式)
# 关于gitment如何配置看这篇 https://imsun.net/posts/gitment-introduction/
# 如果不用的话要把下面的use_comment设置为false
comment:
  gitment:
      owner: # 必填项, 你的GitHub ID
      repo: # 必填项  你的存储评论的repo
      oauth:
        client_id:  # 必填项
        client_secret: # 必填项
        redirect_uri: # 可以填也可以不填

# 是否使用评论系统
use_comment: false

# 自定义页尾配置
custom_footer:
  enable: true
  content: "<a href='https://beian.miit.gov.cn/' target='_blank'>晋ICP备2026006275号-1</a> | <span style=\"display: inline-flex; align-items: center; vertical-align: middle;\"><img src=\"/imgs/TB1..50QpXXXXX7XpXXXXXXXXXX-40-40.png\" width=\"20\" style=\"margin-right: 5px;\" />  <a href=\"https://beian.mps.gov.cn/#/query/webSearch?code=14010502990640\" rel=\"noreferrer\" target=\"_blank\">晋公网安备14010502990640号</a></span>"
  # 示例:
  # enable: true
  # content: "<p>© 2024 My Blog | Powered by Hexo</p>"

# 是否显示文章摘要
show_excerpt: true  # 默认为true，显示文章摘要

# 自动摘要配置
auto_excerpt:
  enable: true  # 是否启用自动摘要功能
  length: 50    # 自动摘要的字符长度（当文章没有手动设置摘要时生效）

# 是否启用自定义鼠标指针
custom_cursor: true  # 默认为true，启用自定义鼠标指针

# 无刷新页面转场功能
page_transition:
  enable: true  # 是否启用无刷新转场
  animation: fade  # 动画类型: fade, slide, scale
  duration: 300   # 动画持续时间(毫秒)

# ========================================
# Material Web Theme Options
# ========================================

# Material Design 3 主题色彩
material:
  # 主色调 (hex值, 不带#号)
  primary_color: 6750A4
  # 次要色
  secondary_color: 625B71
  # 第三色
  tertiary_color: 7D5260
  # 主题模式: light / dark / auto
  theme_mode: auto
  # 圆角大小 (small: 8, medium: 12, large: 16, extra-large: 28)
  shape_corner: medium

# Shiki代码高亮配置
shiki:
  # 主题名 (参考 https://shiki.style/themes)
  theme: one-dark-pro
  # 是否显示行号
  line_numbers: true
  # 是否启用代码块复制按钮
  copy_button: true
